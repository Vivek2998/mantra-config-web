<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed — Mantra Config</title>
    <meta name="robots" content="noindex,nofollow">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #dbe8f4;
            background:
                radial-gradient(ellipse at 50% 18%, rgba(86, 205, 227, 0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 12% 95%, rgba(118, 214, 194, 0.16) 0%, transparent 50%),
                radial-gradient(ellipse at 88% 90%, rgba(30, 48, 71, 0.10) 0%, transparent 45%),
                linear-gradient(168deg, #eaf3f8 0%, #d4e3ee 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #16263B;
            border: 1px solid rgba(95, 133, 175, 0.28);
            border-radius: 16px;
            padding: 40px 32px 32px;
            box-shadow: 0 18px 48px rgba(22, 38, 59, 0.22),
                        0 4px 14px rgba(22, 38, 59, 0.10);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        /* Tighten the card on phones so it doesn't span almost the full width. */
        @media (max-width: 480px) {
            body {
                padding: 24px 32px;
            }
            .card {
                max-width: 340px;
                padding: 34px 24px 26px;
            }
            .check-icon {
                width: 64px;
                height: 64px;
            }
            .check-icon svg {
                width: 32px;
                height: 32px;
            }
            h1 {
                font-size: 20px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            height: 38px;
            width: auto;
            margin: 0 auto 26px;
            display: block;
        }

        .check-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #56cde3 0%, #2e9bb8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 24px rgba(86, 205, 227, 0.28);
        }

        .check-icon svg {
            width: 38px;
            height: 38px;
            stroke: #0f2233;
            stroke-width: 3.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.4px;
            color: #f0f7ff;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #8da4bf;
            margin-bottom: 24px;
            letter-spacing: 0.2px;
        }

        .divider {
            height: 1px;
            background: rgba(95, 133, 175, 0.22);
            margin: 0 0 22px;
        }

        .body-text {
            font-size: 14px;
            line-height: 1.6;
            color: #c5d5e8;
            margin-bottom: 14px;
        }

        .close-note {
            font-size: 13px;
            color: #8da4bf;
            margin-top: 6px;
        }

        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #7d92ad;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <main class="card">
        <img src="SSInnovations_White.png" alt="SS Innovations" class="logo">
        <div class="check-icon">
            <svg viewBox="0 0 24 24"><polyline points="5 12 10 17 19 7"></polyline></svg>
        </div>
        <h1>Email Confirmed</h1>
        <p class="subtitle">Mantra Configuration Manager</p>
        <div class="divider"></div>
        <p class="body-text">Your email address has been verified.</p>
        <p class="close-note">You can safely close this tab.</p>
        <p class="footer">&copy; SS Innovations &middot; Mantra Configuration Manager</p>
    </main>
</body>
</html>
